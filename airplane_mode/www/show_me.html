<!DOCTYPE html>
<html>
<head>
    <title>Color Box</title>

    <style>
        .box {
            width: 300px;
            height: 300px;
            margin: 100px auto;
        }
    </style>
</head>

<body>

   <p>Color = {{ color }}</p>

   <div class="box" style="background-color: {{ color }};"></div>

</body>
</html>
